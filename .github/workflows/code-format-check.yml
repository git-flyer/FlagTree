name: Code-Format-Check

on:
  schedule:
    - cron: '0 21 * * *'
  push:
    branches: [ "main", "triton_v3.2.x", "triton_v3.3.x", "main_add_code_format_check_action"]
  pull_request:
    branches: [ "main", "triton_v3.2.x", "triton_v3.3.x", "main_add_code_format_check_action"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        id: checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_PAT_TOKEN || github.token }}
      - name: Code format check
        uses: flagos-ai/FlagTree/.github/actions/code-format-check@main_add_code_format_check_action