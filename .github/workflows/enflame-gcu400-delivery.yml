name: CD-Enflame-GCU400-triton_v3.5.x

on:
  workflow_dispatch:
    inputs:
      WHL_VER:
        description: '0.5.0.dev1 < 0.5.0a1 < 0.5.0b1 < 0.5.0rc1 < 0.5.0 < 0.5.0.post1'
        required: true
        default: '0.5.0'
      PYTHON_VER:
        required: true
        default: '3.12'

jobs:
  call-delivery:
    uses: FlagTree/flagtree/.github/workflows/enflame-gcu400-delivery.yml@main
    with:
      WHL_VER: ${{ inputs.WHL_VER }}
      PYTHON_VER: ${{ inputs.PYTHON_VER }}
    secrets: inherit
