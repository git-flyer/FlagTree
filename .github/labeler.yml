# Labels applied to PRs based on the files changed.
# Backend labels are set when any file under the backend's third_party/ directory changes.
# The DOC label is set when every changed file is a documentation file
# (matches the same "docs-only" definition used by check-docs-only action:
#  *.md / *.yml / *.txt / CODEOWNERS, but NOT CMakeLists.txt).

# ---- Backend labels ----

nvidia:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/nvidia/**'

xpu:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/xpu/**'

hcu:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/hcu/**'

metax:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/metax/**'

iluvatar:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/iluvatar/**'

mthreads:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/mthreads/**'

ascend:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/ascend/**'

amd:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/amd/**'

cambricon:
  - changed-files:
      - any-glob-to-any-file:
          - 'third_party/cambricon/**'

# ---- DOC label ----
# Applied when all changed files are documentation files.
# Uses negative patterns: the condition holds only if no changed file
# has a recognised code-file extension or is CMakeLists.txt.

DOC:
  - changed-files:
      - all-globs-to-all-files:
          - '!**/CMakeLists.txt'
          - '!**/*.py'
          - '!**/*.cpp'
          - '!**/*.cc'
          - '!**/*.c'
          - '!**/*.h'
          - '!**/*.hpp'
          - '!**/*.cu'
          - '!**/*.cuh'
          - '!**/*.s'
          - '!**/*.ll'
          - '!**/*.mlir'
          - '!**/*.ttir'
          - '!**/*.ttgir'
          - '!**/*.td'
          - '!**/*.cmake'
          - '!**/*.sh'
          - '!**/*.bash'
          - '!**/*.js'
          - '!**/*.ts'
          - '!**/*.go'
          - '!**/*.rs'
          - '!**/*.java'
